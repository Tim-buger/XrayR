name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version written into the binary, without the v prefix
        required: false
        default: dev
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOOS: linux
      GOARCH: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true

      - name: Set version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build XrayR
        run: |
          mkdir -p build_assets
          go build -v -o build_assets/XrayR -trimpath \
            -ldflags "-s -w -buildid= -X github.com/XrayR-project/XrayR/cmd.version=${VERSION}"

      - name: Prepare package
        run: |
          cp README.md LICENSE build_assets/
          cp release/config/dns.json build_assets/dns.json
          cp release/config/route.json build_assets/route.json
          cp release/config/custom_outbound.json build_assets/custom_outbound.json
          cp release/config/custom_inbound.json build_assets/custom_inbound.json
          cp release/config/rulelist build_assets/rulelist
          cp release/config/config.yml.example build_assets/config.yml
          cp release/config/geoip.dat build_assets/geoip.dat
          cp release/config/geosite.dat build_assets/geosite.dat

      - name: Create archive and checksum
        run: |
          (
            cd build_assets
            zip -9r ../XrayR-linux-64.zip .
          )
          sha256sum XrayR-linux-64.zip > XrayR-linux-64.zip.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: XrayR-linux-64
          path: |
            XrayR-linux-64.zip
            XrayR-linux-64.zip.sha256

      - name: Upload files to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            XrayR-linux-64.zip
            XrayR-linux-64.zip.sha256
